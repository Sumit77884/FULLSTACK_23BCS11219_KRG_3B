# ============================================================
# Project 2 - Spring Security WITH JWT
# ============================================================

server.port=8081

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:jwtclassroomdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=true

# *** JWT secret key (must be at least 256 bits = 32 characters) ***
# In production: move this to environment variables, never commit it to Git!
jwt.secret=classroom-super-secret-key-must-be-at-least-256-bits-long
jwt.expiration-ms=3600000
# 3600000 ms = 1 hour
